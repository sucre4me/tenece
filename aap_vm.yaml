- name: Create and Boot VM directly on ESXi host
  hosts: localhost
  gather_facts: no
  collections:
    - vmware.vmware

  vars:
    esxi_ip: "192.168.9.7"
    datastore: "datastore1"
    network_name: "VM Network"
    vm_name: "rhel8-auto-vm"

  tasks:
    - name: Create and Configure VM with Boot Order
      vmware.vmware.vm:
        hostname: "{{ esxi_ip }}"
        username: "root"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false

        # Placement parameters for ESXi
        datacenter: "ha-datacenter"
        folder: "/ha-datacenter/vm"
        resource_pool: "Resources"
        datastore: "{{ datastore }}"
        
        name: "{{ vm_name }}"
        state: present
        power_state: poweredon      # Ensures the VM starts
        guest_id: rhel8_64Guest

        # 1. Set BIOS Boot Order (Prioritize CD-ROM)
        vm_options:
          boot_order:
            - cdrom
            - disk
            - ethernet

        disks:
          - device_node: "scsi(0:0)"
            datastore: "{{ datastore }}"
            provisioning: thin
            size: "40gb"

        cpu:
          cores: 2

        memory:
          size_mb: 4096

        scsi_controllers:
          - bus_number: 0
            controller_type: paravirtual

        sata_controllers:
          - bus_number: 0

        cdroms:
          - device_node: "sata(0:0)"
            iso_media_path: "[{{ datastore }}] rhel-8.10-x86_64-dvd.iso"
            connect_at_power_on: true # 2. Force ISO to "insert" at boot

        network_adapters:
          - network: "{{ network_name }}"
            adapter_type: vmxnet3

      delegate_to: localhost

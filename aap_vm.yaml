---
- name: Create and Boot VM on ESXi host
  hosts: localhost
  gather_facts: no
  collections:
    - vmware.vmware

  vars:
    esxi_ip: "192.168.9.7"
    datastore: "datastore1"
    network_name: "VM Network"
    vm_name: "rhel8-auto-vm"
    iso_name: "rhel-8.10-x86_64-dvd.iso"

  tasks:
    - name: Define and Create the VM
      vmware.vmware.vm:
        hostname: "{{ esxi_ip }}"
        username: "root"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false
        
        # Standalone ESXi Defaults
        datacenter: "ha-datacenter"
        folder: "/ha-datacenter/vm"
        resource_pool: "Resources"
        datastore: "{{ datastore }}"
        
        name: "{{ vm_name }}"
        state: present
        guest_id: rhel8_64Guest

        disks:
          - device_node: "scsi(0:0)"
            datastore: "{{ datastore }}"
            provisioning: thin
            size: "40gb"

        cpu:
          cores: 2

        memory:
          size_mb: 4096

        scsi_controllers:
          - bus_number: 0
            controller_type: paravirtual

        sata_controllers:
          - bus_number: 0

        cdroms:
          - device_node: "sata(0:0)"
            iso_media_path: "[{{ datastore }}] {{ iso_name }}"
            # CRITICAL: Ensures the ISO is "plugged in" when the VM starts
            connect_at_power_on: true 

        network_adapters:
          - network: "{{ network_name }}"
            adapter_type: vmxnet3

    - name: Power on the VM to start installation
      vmware.vmware.vm_powerstate:
        hostname: "{{ esxi_ip }}"
        username: "root"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false
        name: "{{ vm_name }}"
        state: powered-on

      delegate_to: localhost

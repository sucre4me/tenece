---
- name: Fast Automated RHEL 8 Installation (Final Fix - Clean Slate)
  hosts: localhost
  gather_facts: no
  connection: local
  collections:
    - community.vmware
    - vmware.vmware

  vars:
    esxi_ip: "192.168.9.7"
    bastion_ip: "192.168.9.5"
    vm_name: "rhel8-auto-vm"
    datastore: "datastore1"
    network_name: "VM Network"
    iso_path: "[{{ datastore }}] rhel-8.10-x86_64-dvd.iso"
    datacenter_name: "ha-datacenter"

    # 100 Backspaces + The absolute minimal boot command
    ks_clear_and_type: "\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b\b vmlinuz initrd=initrd.img inst.ks=http://{{ bastion_ip }}:8080/ks.cfg ip=dhcp"

    vmware_user: "root"
    vmware_password: "{{ lookup('env','VMWARE_PASSWORD') }}"

  tasks:
    - name: 1. Cleanup - Remove existing VM
      vmware.vmware.vm:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        datacenter: "{{ datacenter_name }}"
        name: "{{ vm_name }}"
        state: absent
      ignore_errors: yes

    - name: 2. Create VM Configuration
      vmware.vmware.vm:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        datacenter: "{{ datacenter_name }}"
        folder: "/ha-datacenter/vm"
        resource_pool: "Resources"
        datastore: "{{ datastore }}"
        name: "{{ vm_name }}"
        state: present
        guest_id: rhel8_64Guest
        vm_options: { boot_firmware: bios }
        scsi_controllers: [{ bus_number: 0, controller_type: paravirtual }]
        sata_controllers: [{ bus_number: 0 }]
        cpu: { cores: 2 }
        memory: { size_mb: 4096 }
        disks: [{ device_node: "scsi(0:0)", datastore: "{{ datastore }}", size: "40gb", provisioning: thin }]
        cdroms: [{ device_node: "sata(0:0)", iso_media_path: "{{ iso_path }}", connect_at_power_on: true }]
        network_adapters: [{ network: "{{ network_name }}", adapter_type: vmxnet3 }]

    - name: "3. Power On"
      vmware.vmware.vm_powerstate:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        datacenter: "{{ datacenter_name }}"
        name: "{{ vm_name }}"
        state: powered-on

    - name: 4. Wait 4s for GRUB Menu
      ansible.builtin.pause:
        seconds: 4

    - name: "5. Press TAB"
      community.vmware.vmware_guest_sendkey:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        datacenter: "{{ datacenter_name }}"
        name: "{{ vm_name }}"
        keys_send: [ TAB ]

    - name: 5b. Wait 1s
      ansible.builtin.pause:
        seconds: 1

    - name: "6. Clear and Type URL"
      community.vmware.vmware_guest_sendkey:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        datacenter: "{{ datacenter_name }}"
        name: "{{ vm_name }}"
        string_send: "{{ ks_clear_and_type }}"
        sleep_time: 150 

    - name: 6b. Wait 2s
      ansible.builtin.pause:
        seconds: 2

    - name: "7. Press ENTER to Boot"
      community.vmware.vmware_guest_sendkey:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        datacenter: "{{ datacenter_name }}"
        name: "{{ vm_name }}"
        keys_send: [ ENTER ]

---
- name: Fast Automated RHEL 8 Installation (DHCP & Optimized Typing)
  hosts: localhost
  gather_facts: no
  collections:
    - community.vmware
    - vmware.vmware

  vars:
    # --- Infrastructure Details ---
    esxi_ip: "192.168.9.7"
    bastion_ip: "192.168.9.5"
    vm_name: "rhel8-auto-vm"
    datastore: "datastore1"
    network_name: "VM Network"
    iso_path: "[{{ datastore }}] rhel-8.10-x86_64-dvd.iso"

    # --- Boot Logic Fixes ---
    # 'ip=dhcp' manually "turns on" the NIC to fetch the Kickstart file.
    # 'rd.live.check=0' skips the slow "Media Check" screen.
    ks_command: " ip=dhcp inst.ks=http://{{ bastion_ip }}:8080/ks.cfg rd.live.check=0"

    # --- Credentials ---
    vmware_user: "root"
    vmware_password: "{{ lookup('env','VMWARE_PASSWORD') }}"

  tasks:
    - name: 1. Cleanup - Remove existing VM if present
      vmware.vmware.vm:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        name: "{{ vm_name }}"
        state: absent
      ignore_errors: yes

    - name: 2. Create VM Configuration (BIOS Mode)
      vmware.vmware.vm:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        datacenter: "ha-datacenter"
        folder: "/ha-datacenter/vm"
        resource_pool: "Resources"
        datastore: "{{ datastore }}"
        name: "{{ vm_name }}"
        state: present
        guest_id: rhel8_64Guest
        vm_options:
          boot_firmware: bios
        cpu: { cores: 2 }
        memory: { size_mb: 4096 }
        disks:
          - device_node: "scsi(0:0)"
            datastore: "{{ datastore }}"
            size: "40gb"
        cdroms:
          - device_node: "sata(0:0)"
            iso_media_path: "{{ iso_path }}"
            connect_at_power_on: true 
        network_adapters:
          - network: "{{ network_name }}"
            adapter_type: vmxnet3

    - name: 3. Power On the VM
      vmware.vmware.vm_powerstate:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        name: "{{ vm_name }}"
        state: powered-on

    - name: 4. Wait for RHEL Splash Screen (10s)
      ansible.builtin.pause:
        seconds: 10

    - name: 5. Press TAB to edit boot line
      community.vmware.vmware_guest_sendkey:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        name: "{{ vm_name }}"
        keys_send: [ TAB ]

    - name: 6. Fast-Type Kickstart & Network Enable (80ms delay)
      community.vmware.vmware_guest_sendkey:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        name: "{{ vm_name }}"
        # 80ms is fast enough to look smooth but slow enough for ESXi to catch every char
        sleep_time: 80 
        string_send: "{{ ks_command }}"

    - name: 7. Press ENTER to Execute
      community.vmware.vmware_guest_sendkey:
        hostname: "{{ esxi_ip }}"
        username: "{{ vmware_user }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        name: "{{ vm_name }}"
        keys_send: [ ENTER ]

    - name: 8. Automation Complete
      ansible.builtin.debug:
        msg: "Typing complete! Look at your Bastion terminal now for the 'GET /ks.cfg 200' log."

---
- name: Fully Automated RHEL 8 Installation on ESXi
  hosts: localhost
  gather_facts: no
  collections:
    - community.vmware
    - vmware.vmware

  vars:
    esxi_ip: "192.168.9.7"
    bastion_ip: "192.168.9.5"
    vm_name: "rhel8-auto-vm"
    datastore: "datastore1"
    network_name: "VM Network"
    iso_path: "[{{ datastore }}] rhel-8.10-x86_64-dvd.iso"
    # The leading space is critical to separate the command from existing boot arguments
    ks_command: " inst.ks=http://{{ bastion_ip }}:8080/ks.cfg"

  tasks:
    - name: Task 1 - Create the VM configuration (BIOS Mode)
      vmware.vmware.vm:
        hostname: "{{ esxi_ip }}"
        username: "root"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false
        datacenter: "ha-datacenter"
        folder: "/ha-datacenter/vm"
        resource_pool: "Resources"
        datastore: "{{ datastore }}"
        name: "{{ vm_name }}"
        state: present
        guest_id: rhel8_64Guest
        
        # Force BIOS firmware to ensure the TAB key works
        vm_options:
          boot_firmware: bios

        scsi_controllers:
          - bus_number: 0
            controller_type: paravirtual
        sata_controllers:
          - bus_number: 0
        cpu:
          cores: 2
        memory:
          size_mb: 4096
        disks:
          - device_node: "scsi(0:0)"
            datastore: "{{ datastore }}"
            provisioning: thin
            size: "40gb"
        cdroms:
          - device_node: "sata(0:0)"
            iso_media_path: "{{ iso_path }}"
            connect_at_power_on: true 
        network_adapters:
          - network: "{{ network_name }}"
            adapter_type: vmxnet3

    - name: Task 2 - Power on the VM
      vmware.vmware.vm_powerstate:
        hostname: "{{ esxi_ip }}"
        username: "root"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false
        datacenter: "ha-datacenter" 
        name: "{{ vm_name }}"
        state: powered-on

    - name: Task 3 - Wait for BIOS to finish and RHEL Menu to appear
      ansible.builtin.pause:
        seconds: 10

    - name: Task 4 - Press TAB and type Kickstart URL slowly
      community.vmware.vmware_guest_sendkey:
        hostname: "{{ esxi_ip }}"
        username: "root"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false
        datacenter: "ha-datacenter"
        name: "{{ vm_name }}"
        # 100ms delay between characters prevents VMware from missing keys
        sleep_time: 100 
        keys_send:
          - TAB
        string_send: "{{ ks_command }}"

    - name: Task 5 - Press ENTER to start the installer
      community.vmware.vmware_guest_sendkey:
        hostname: "{{ esxi_ip }}"
        username: "root"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false
        datacenter: "ha-datacenter"
        name: "{{ vm_name }}"
        keys_send:
          - ENTER

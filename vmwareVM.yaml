- name: Create VM in vCenter without template
  hosts: localhost
  gather_facts: no
  collections:
    - vmware.vmware

  vars:
    datacenter: "Datacenter"
    cluster: "Cluster01"
    datastore: "datastore1"
    network: "VM Network"
    vm_name: "rhel8-auto-vm"

  tasks:
    - name: Create VM from ISO in datastore1
      vmware.vmware.vm:
        hostname: "{{ lookup('env','VMWARE_HOST') }}"
        username: "{{ lookup('env','VMWARE_USER') }}"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false

        datacenter: "{{ datacenter }}"
        cluster: "{{ cluster }}"
        folder: "{{ datacenter }}/vm"

        name: "{{ vm_name }}"
        state: present
        power_state: poweredon
        guest_id: rhel8_64Guest

        disks:
          - device_node: "scsi0:0"
            datastore: "{{ datastore }}"
            provisioning: thin      # Changed from 'type'
            size:                   # Required dictionary
              gb: 40

        cpu:
          count: 2

        memory:
          size_mb: 4096

        scsi_controllers:
          - type: pvscsi
            bus_number: 0

        # Most modern guest_ids require a SATA controller for the CDROM
        sata_controllers:
          - bus_number: 0

        cdroms:
          - device_node: "sata0:0"
            type: iso
            iso_path: "[{{ datastore }}] rhel-8.10-x86_64-dvd.iso"

        network_adapters:
          - name: "{{ network }}"
            type: vmxnet3

      delegate_to: localhost

- name: Create VM directly on ESXi host
  hosts: localhost
  gather_facts: no
  collections:
    - vmware.vmware

  vars:
    # Use the ESXi host's IP or hostname
    esxi_ip: "{{ lookup('env','VMWARE_HOST') }}"
    datastore: "datastore1"
    network_name: "VM Network"
    vm_name: "rhel8-auto-vm"

  tasks:
    - name: Create VM from ISO in datastore1
      vmware.vmware.vm:
        hostname: "{{ esxi_ip }}"
        username: "{{ lookup('env','VMWARE_USER') }}"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false

        # For standalone ESXi, use these instead of datacenter/cluster
        esxi_host: "{{ esxi_ip }}"
        datastore: "{{ datastore }}"
        folder: "ha-datacenter/vm" # Default folder for standalone ESXi

        name: "{{ vm_name }}"
        state: present
        guest_id: rhel8_64Guest

        disks:
          - device_node: "scsi(0:0)"
            datastore: "{{ datastore }}"
            provisioning: thin
            size: "40gb"

        cpu:
          cores: 2

        memory:
          size_mb: 4096

        scsi_controllers:
          - bus_number: 0
            controller_type: paravirtual

        sata_controllers:
          - bus_number: 0

        cdroms:
          - device_node: "sata(0:0)"
            iso_media_path: "[{{ datastore }}] rhel-8.10-x86_64-dvd.iso"

        network_adapters:
          - network: "{{ network_name }}"
            adapter_type: vmxnet3

      delegate_to: localhost

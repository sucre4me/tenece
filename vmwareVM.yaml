- name: Create VM in vCenter without template
  hosts: localhost
  gather_facts: no
  collections:
    - vmware.vmware

  vars:
    datacenter: "Datacenter"
    cluster: "Cluster01"
    datastore: "datastore1"
    network_name: "VM Network"
    vm_name: "rhel8-auto-vm"

  tasks:
    - name: Create VM from ISO in datastore1
      vmware.vmware.vm:
        hostname: "{{ lookup('env','VMWARE_HOST') }}"
        username: "{{ lookup('env','VMWARE_USER') }}"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false

        datacenter: "{{ datacenter }}"
        cluster: "{{ cluster }}"
        datastore: "{{ datastore }}"
        folder: "vm" # Changed from 'Datacenter/vm' to just 'vm'

        name: "{{ vm_name }}"
        state: present
        guest_id: rhel8_64Guest

        disks:
          - device_node: "scsi(0:0)"
            datastore: "{{ datastore }}"
            provisioning: thin
            size: "40gb"

        cpu:
          cores: 2

        memory:
          size_mb: 4096

        scsi_controllers:
          - bus_number: 0
            controller_type: paravirtual

        sata_controllers:
          - bus_number: 0

        cdroms:
          - device_node: "sata(0:0)"
            iso_media_path: "[{{ datastore }}] rhel-8.10-x86_64-dvd.iso"

        network_adapters:
          - network: "{{ network_name }}"
            adapter_type: vmxnet3

      delegate_to: localhost

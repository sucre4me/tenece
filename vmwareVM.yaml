- name: Create VM in vCenter without template
  hosts: localhost
  gather_facts: no
  collections:
    - vmware.vmware

  vars:
    datacenter: "Datacenter"
    cluster: "Cluster01"
    datastore: "datastore1"
    network_name: "VM Network"
    vm_name: "rhel8-auto-vm"

  tasks:
    - name: Create VM from ISO in datastore1
      vmware.vmware.vm:
        hostname: "{{ lookup('env','VMWARE_HOST') }}"
        username: "{{ lookup('env','VMWARE_USER') }}"
        password: "{{ lookup('env','VMWARE_PASSWORD') }}"
        validate_certs: false

        datacenter: "{{ datacenter }}"
        cluster: "{{ cluster }}"
        folder: "{{ datacenter }}/vm"

        name: "{{ vm_name }}"
        state: present
        guest_id: rhel8_64Guest

        disks:
          - device_node: "scsi0:0"
            datastore: "{{ datastore }}"
            provisioning: thin
            size:
              gb: 40

        cpu:
          num_cpus: 2  # Changed from 'count' to 'num_cpus'

        memory:
          size_mb: 4096

        scsi_controllers:
          - bus_number: 0
            controller_type: paravirtual # Removed 'type'

        sata_controllers:
          - bus_number: 0

        cdroms:
          - device_node: "sata0:0"
            iso_media_path: "[{{ datastore }}] rhel-8.10-x86_64-dvd.iso" # Changed from 'iso_path'

        network_adapters:
          - network: "{{ network_name }}"
            adapter_type: vmxnet3 # Changed from 'type'

      delegate_to: localhost
